name: deploy

# Rolling deploy to the PM2 backend fleet. Trigger: GitHub only.
#   Actions -> deploy -> Run workflow, or:  gh workflow run deploy.yml -f ref=main
#
# SSHes each box in turn (BE1 then BE2) and runs git pull -> build -> pm2 restart.
# `set -e` means a failed build aborts BEFORE the restart, so the box keeps
# serving its old code; the failed step also stops the job, so BE2 is left
# untouched. The other box always serves while one restarts (Cloudflare LB).
#
# Required repo secrets:
#   BE1_HOST, BE2_HOST            - backend public IPs
#   DEPLOY_SSH_KEY               - private key authorized as root on both boxes
#   (optional) DEPLOY_SSH_PORT   - defaults to 22
on:
  workflow_dispatch:
    inputs:
      ref:
        description: "git ref (branch / tag / SHA) to deploy"
        required: false
        default: main

concurrency:
  group: fleet-deploy
  cancel-in-progress: false

jobs:
  rollout:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy BE1 (leader-capable)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.BE1_HOST }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_SSH_PORT || 22 }}
          command_timeout: 10m
          script: |
            set -e
            export PATH=/root/.nvm/versions/node/v24.14.0/bin:$PATH
            cd /root/qubic-infra-admin-backend
            REF="${{ github.event.inputs.ref }}"
            git fetch origin --prune --tags
            git checkout -f "$REF"
            git reset --hard "origin/$REF" 2>/dev/null || true   # ff branch to tip; no-op for tag/SHA
            echo "deploying $(git rev-parse --short HEAD)"
            npm ci
            npm run build
            pm2 restart qubic --update-env
            sleep 6
            curl -fsS http://127.0.0.1:80/health && echo " <- BE1 healthy"

      - name: Deploy BE2 (only after BE1 healthy)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.BE2_HOST }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_SSH_PORT || 22 }}
          command_timeout: 10m
          script: |
            set -e
            export PATH=/root/.nvm/versions/node/v24.14.0/bin:$PATH
            cd /root/qubic-infra-admin-backend
            REF="${{ github.event.inputs.ref }}"
            git fetch origin --prune --tags
            git checkout -f "$REF"
            git reset --hard "origin/$REF" 2>/dev/null || true
            echo "deploying $(git rev-parse --short HEAD)"
            npm ci
            npm run build
            pm2 restart qubic --update-env
            sleep 6
            curl -fsS http://127.0.0.1:80/health && echo " <- BE2 healthy"
