name: deploy

# Rolling deploy to the PM2 backend fleet — data-driven, GitHub-trigger only.
#   gh workflow run deploy.yml -f ref=main      (or Actions -> deploy -> Run)
#
# The fleet is ONE repo variable:
#   vars.BACKEND_HOSTS = JSON array of host IPs, e.g. ["77.42.74.26","40.160.3.59"]
# The matrix fans out over it. max-parallel:1 = rolling (one box at a time);
# fail-fast = a failed box halts the roll so the rest keep their old build.
#
# >>> ADD AN INSTANCE = append its IP to the variable, no workflow edit:
#       gh variable set BACKEND_HOSTS -b '["77.42.74.26","40.160.3.59","NEW_IP"]'
#     (provision the box with scripts/bootstrap-backend.sh, then add it to the
#      Cloudflare LB pool).
#
# Each box must follow the convention: nvm node, repo at
# /root/qubic-infra-admin-backend, pm2 app "qubic", app on PORT 80.
#
# Required: vars.BACKEND_HOSTS (JSON array), secrets.DEPLOY_SSH_KEY (root on all).
# Optional: vars.DEPLOY_SSH_PORT (default 22).
on:
  workflow_dispatch:
    inputs:
      ref:
        description: "git ref (branch / tag / SHA) to deploy"
        required: false
        default: main

concurrency:
  group: fleet-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 1 # rolling: one instance at a time
      fail-fast: true # a failed box halts the roll -> others keep old build
      matrix:
        host: ${{ fromJSON(vars.BACKEND_HOSTS) }}
    name: deploy ${{ matrix.host }}
    steps:
      - name: Pull + build + restart
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ matrix.host }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ vars.DEPLOY_SSH_PORT || 22 }}
          command_timeout: 10m
          script: |
            set -e
            APP_DIR=/root/qubic-infra-admin-backend
            APP_NAME=qubic
            # Resolve node from nvm (default alias, else any installed, else newest bin).
            export NVM_DIR="$HOME/.nvm"
            . "$NVM_DIR/nvm.sh" 2>/dev/null || true
            nvm use default >/dev/null 2>&1 || nvm use node >/dev/null 2>&1 || true
            command -v node >/dev/null || export PATH="$(ls -d $NVM_DIR/versions/node/*/bin 2>/dev/null | sort -V | tail -1):$PATH"
            node -v
            cd "$APP_DIR"
            REF="${{ github.event.inputs.ref }}"
            git fetch origin --prune --tags
            git checkout -f "$REF"
            git reset --hard "origin/$REF" 2>/dev/null || true   # ff branch; no-op for tag/SHA
            echo "deploying $(git rev-parse --short HEAD) on $(hostname)"
            npm ci
            npm run build
            pm2 restart "$APP_NAME" --update-env
            sleep 6
            curl -fsS http://127.0.0.1:80/health && echo " <- healthy"
